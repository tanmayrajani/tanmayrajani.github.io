
<meta charset="utf-8">
<link rel="stylesheet" href="style.css">

<div class="root">
  <p class="section-label">Monthly investment amount</p>
  <div class="amount-row">
    <input type="range" id="amountSlider" min="10000" max="500000" step="5000" value="100000">
    <span class="amount-display" id="amountDisplay">₹1,00,000</span>
  </div>
  <div class="toggle-row" id="toggleRow">
    <button class="toggle-btn active" data-mode="proportional">Proportional to target</button>
    <button class="toggle-btn" data-mode="need">Buy only underweight</button>
  </div>
  <div class="grid4" id="summaryCards"></div>
  <div class="table-wrap">
    <table class="alloc-table">
      <thead>
        <tr>
          <th style="width:20%">Category</th>
          <th class="num" style="width:11%">Current %</th>
          <th class="num" style="width:11%">Target %</th>
          <th class="num" style="width:10%">Gap</th>
          <th style="width:25%">Status</th>
          <th class="num" style="width:19%">Invest this month</th>
          <th style="width:4%"></th>
        </tr>
      </thead>
      <tbody id="allocBody"></tbody>
      <tfoot id="allocFoot"></tfoot>
    </table>
  </div>
  <div class="sum-row" id="sumRow"></div>
  <button class="add-row-btn" id="addRowBtn">+ Add category</button>
  <p class="modeNote" id="modeNote"></p>
</div>

<script src="app.js"></script>
