
<style>
  :root {
    color-scheme: dark;
    --font-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --border-radius-md: 6px;
    --border-radius-lg: 10px;
    --color-background-primary: #111214;
    --color-background-secondary: #1c1d1f;
    --color-text-primary: #e0e0e0;
    --color-text-secondary: #888888;
    --color-border-primary: #4a4a4a;
    --color-border-secondary: #2d2d2d;
    --color-border-tertiary: #222426;
    --color-background-success: #0a2e1c;
    --color-text-success: #4ade98;
    --color-background-danger: #2e0d0d;
    --color-text-danger: #f87171;
    --color-background-warning: #2e1d07;
    --color-text-warning: #fbbf24;
  }
  html, body { background: var(--color-background-primary); margin: 0; zoom: 1.1; }
  * { box-sizing: border-box; }
  .root { padding: 1rem 0; font-family: var(--font-sans); max-width: 960px; margin: 0 auto; color: var(--color-text-primary); }
  .section-label { font-size: 14px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 8px; }
  .tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); overflow: hidden; width: fit-content; }
  .tab { padding: 6px 18px; font-size: 14px; cursor: pointer; background: transparent; border: none; color: var(--color-text-secondary); border-right: 0.5px solid var(--color-border-secondary); }
  .tab:last-child { border-right: none; }
  .tab.active { background: var(--color-background-secondary); color: var(--color-text-primary); font-weight: 500; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* Config panel */
  .config-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .config-table th { text-align: left; font-size: 14px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; padding: 6px 8px; border-bottom: 0.5px solid var(--color-border-tertiary); font-weight: 500; }
  .config-table th.num { text-align: right; }
  .config-table td { padding: 5px 6px; border-bottom: 0.5px solid var(--color-border-tertiary); vertical-align: middle; color: var(--color-text-primary); }
  .config-table tr:last-child td { border-bottom: none; }
  .config-table input[type=number] { width: 80px; text-align: right; padding: 4px 6px 4px 6px; font-size: 14px; border: 0.5px solid var(--color-border-secondary); border-radius: 4px; background: var(--color-background-primary); color: var(--color-text-primary); }
  .config-table input[type=number]:focus { outline: none; border-color: var(--color-border-primary); }
  .config-table input[type=text] { width: 100%; padding: 4px 6px; font-size: 14px; border: 0.5px solid var(--color-border-secondary); border-radius: 4px; background: var(--color-background-primary); color: var(--color-text-primary); }
  .config-table input[type=text]:focus { outline: none; border-color: var(--color-border-primary); }
  .gap-pill { font-size: 14px; padding: 2px 7px; border-radius: 10px; font-weight: 500; display: inline-block; min-width: 52px; text-align: center; }
  .pill-green  { background: var(--color-background-success); color: var(--color-text-success); }
  .pill-red    { background: var(--color-background-danger);  color: var(--color-text-danger);  }
  .pill-amber  { background: var(--color-background-warning); color: var(--color-text-warning); }
  .pill-gray   { background: var(--color-background-secondary); color: var(--color-text-secondary); }
  .sum-row { display: flex; gap: 16px; margin: 10px 0 0; font-size: 14px; color: var(--color-text-secondary); align-items: center; flex-wrap: wrap; }
  .sum-chip { display: flex; align-items: center; gap: 5px; }
  .sum-val { font-weight: 500; font-size: 14px; }
  .sum-val.warn { color: var(--color-text-danger); }
  .sum-val.ok   { color: var(--color-text-success); }
  .add-row-btn { margin-top: 10px; padding: 5px 14px; font-size: 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); cursor: pointer; background: transparent; color: var(--color-text-secondary); }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--color-text-secondary); font-size: 16px; padding: 0 4px; line-height: 1; }
  .del-btn:hover { color: var(--color-text-danger); }
  input[type=number] {
    -webkit-appearance: textfield;
    -moz-appearance:    textfield;
    appearance:         textfield;
  }

  /* Allocator panel */
  .amount-row { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; }
  .amount-row input[type=range] { flex: 1; }
  .amount-display { font-size: 20px; font-weight: 500; min-width: 110px; text-align: right; }
  .toggle-row { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .toggle-btn { padding: 5px 14px; font-size: 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); cursor: pointer; background: transparent; color: var(--color-text-secondary); }
  .toggle-btn.active { background: var(--color-background-primary); color: var(--color-text-primary); border-color: var(--color-border-primary); font-weight: 500; }
  .grid4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .metric-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.65rem 1rem; }
  .metric-label { font-size: 14px; color: var(--color-text-secondary); margin: 0 0 3px; }
  .metric-val { font-size: 17px; font-weight: 500; margin: 0; }
  .metric-val.pos { color: var(--color-text-success); }
  .metric-val.neg { color: var(--color-text-danger); }
  .alloc-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .alloc-table th { text-align: left; font-weight: 500; font-size: 14px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; padding: 6px 8px; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .alloc-table th.num { text-align: right; }
  .alloc-table td { padding: 7px 8px; border-bottom: 0.5px solid var(--color-border-tertiary); vertical-align: middle; color: var(--color-text-primary); }
  .alloc-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .alloc-table tr:last-child td { border-bottom: none; }
  .bar-wrap { background: var(--color-border-tertiary); border-radius: 2px; height: 5px; min-width: 50px; overflow: hidden; }
  .bar-fill { height: 5px; border-radius: 2px; }
  .badge { display: inline-block; font-size: 14px; padding: 2px 7px; border-radius: 4px; font-weight: 500; white-space: nowrap; }
  .badge-green  { background: var(--color-background-success); color: var(--color-text-success); }
  .badge-amber  { background: var(--color-background-warning); color: var(--color-text-warning); }
  .badge-red    { background: var(--color-background-danger);  color: var(--color-text-danger);  }
  .badge-neutral{ background: var(--color-background-secondary); color: var(--color-text-secondary); }
  .modeNote { font-size: 14px; color: var(--color-text-secondary); margin: 10px 0 0; }
  .table-wrap { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
</style>

<div class="root">
  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="allocate">Allocator</button>
    <button class="tab" data-tab="config">Edit portfolio</button>
  </div>

  <!-- ALLOCATOR PANEL -->
  <div class="panel active" id="panel-allocate">
    <p class="section-label">Monthly investment amount</p>
    <div class="amount-row">
      <input type="range" id="amountSlider" min="10000" max="500000" step="5000" value="100000">
      <span class="amount-display" id="amountDisplay">₹1,00,000</span>
    </div>
    <div class="toggle-row" id="toggleRow">
      <button class="toggle-btn active" data-mode="proportional">Proportional to target</button>
      <button class="toggle-btn" data-mode="need">Buy only underweight</button>
    </div>
    <div class="grid4" id="summaryCards"></div>
    <div class="table-wrap">
      <table class="alloc-table">
        <thead>
          <tr>
            <th>Category</th>
            <th class="num">Current</th>
            <th class="num">Target</th>
            <th class="num">Gap</th>
            <th>Status</th>
            <th class="num">Invest this month</th>
          </tr>
        </thead>
        <tbody id="allocBody"></tbody>
        <tfoot id="allocFoot"></tfoot>
      </table>
    </div>
    <p class="modeNote" id="modeNote"></p>
  </div>

  <!-- CONFIG PANEL -->
  <div class="panel" id="panel-config">
    <div class="table-wrap">
      <table class="config-table">
        <thead>
          <tr>
            <th style="width:38%">Category</th>
            <th class="num" style="width:18%">Current %</th>
            <th class="num" style="width:18%">Target %</th>
            <th class="num" style="width:18%">Gap</th>
            <th style="width:8%"></th>
          </tr>
        </thead>
        <tbody id="configBody"></tbody>
      </table>
    </div>
    <div class="sum-row" id="sumRow"></div>
    <button class="add-row-btn" id="addRowBtn">+ Add category</button>
  </div>
</div>

<script>
const DEFAULT_CATEGORIES = [
  { name: "Direct Equity",   current: 4.61,  target: 2.00  },
  { name: "Nifty 50",        current: 22.02, target: 28.50 },
  { name: "Nifty Next 50",   current: 8.39,  target: 10.00 },
  { name: "Mid Cap",         current: 6.97,  target: 8.00  },
  { name: "Small Cap",       current: 3.67,  target: 3.50  },
  { name: "Flexicap",        current: 2.45,  target: 3.00  },
  { name: "Global Equity",   current: 7.82,  target: 11.50 },
  { name: "Others",          current: 1.79,  target: 1.00  },
  { name: "Hybrid",          current: 10.86, target: 13.00 },
  { name: "Debt",            current: 28.23, target: 15.00 },
  { name: "Precious Metal",  current: 3.18,  target: 4.50  },
];

let categories = DEFAULT_CATEGORIES.map(c => ({ ...c }));
let mode = 'proportional';
let amount = 100000;

const LS_KEY = 'sip-rebalance-state';

function saveState() {
  localStorage.setItem(LS_KEY, JSON.stringify({ categories, mode, amount }));
}

(function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(LS_KEY));
    if (saved && Array.isArray(saved.categories) && saved.categories.length > 0) {
      categories = saved.categories;
      if (saved.mode === 'proportional' || saved.mode === 'need') mode = saved.mode;
      if (typeof saved.amount === 'number' && saved.amount >= 10000) amount = saved.amount;
    }
  } catch (e) { /* corrupted storage — use defaults */ }
})();

// Tab switching
document.getElementById('tabs').addEventListener('click', function(e) {
  const btn = e.target.closest('[data-tab]');
  if (!btn) return;
  const tab = btn.dataset.tab;
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
  if (tab === 'allocate') renderAllocator();
  if (tab === 'config')   renderConfig();
});

// Sync slider and mode buttons to loaded state
document.getElementById('amountSlider').value = amount;
document.getElementById('amountDisplay').textContent = '₹' + amount.toLocaleString('en-IN');
document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));

// Mode toggle
document.getElementById('toggleRow').addEventListener('click', function(e) {
  const btn = e.target.closest('[data-mode]');
  if (!btn) return;
  mode = btn.dataset.mode;
  document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  saveState();
  renderAllocator();
});

// Slider
document.getElementById('amountSlider').addEventListener('input', function() {
  amount = parseInt(this.value);
  document.getElementById('amountDisplay').textContent = '₹' + amount.toLocaleString('en-IN');
  saveState();
  renderAllocator();
});

// Add category
document.getElementById('addRowBtn').addEventListener('click', function() {
  categories.push({ name: 'New category', current: 0, target: 0 });
  saveState();
  renderConfig();
});

// Config table — event delegation
document.getElementById('configBody').addEventListener('input', function(e) {
  const el = e.target;
  const row = el.closest('tr');
  if (!row) return;
  const idx = parseInt(row.dataset.idx);
  if (el.dataset.field === 'name')    categories[idx].name    = el.value;
  if (el.dataset.field === 'current') categories[idx].current = parseFloat(el.value) || 0;
  if (el.dataset.field === 'target')  categories[idx].target  = parseFloat(el.value) || 0;
  updateConfigGap(row, idx);
  updateSumRow();
  saveState();
});

document.getElementById('configBody').addEventListener('click', function(e) {
  const btn = e.target.closest('.del-btn');
  if (!btn) return;
  const idx = parseInt(btn.closest('tr').dataset.idx);
  categories.splice(idx, 1);
  saveState();
  renderConfig();
});

function gapPill(gap) {
  const sign = gap > 0 ? '+' : '';
  const label = sign + gap.toFixed(2) + '%';
  if (gap > 1)  return `<span class="gap-pill pill-green">${label}</span>`;
  if (gap > 0)  return `<span class="gap-pill pill-amber">${label}</span>`;
  if (gap < -1) return `<span class="gap-pill pill-red">${label}</span>`;
  if (gap < 0)  return `<span class="gap-pill pill-amber">${label}</span>`;
  return `<span class="gap-pill pill-gray">0.00%</span>`;
}

function updateConfigGap(row, idx) {
  const c = categories[idx];
  row.querySelector('.gap-cell').innerHTML = gapPill(c.target - c.current);
}

function updateSumRow() {
  const sumCurrent = categories.reduce((a, c) => a + c.current, 0);
  const sumTarget  = categories.reduce((a, c) => a + c.target,  0);
  const cOk = Math.abs(sumCurrent - 100) < 0.01;
  const tOk = Math.abs(sumTarget  - 100) < 0.01;
  document.getElementById('sumRow').innerHTML = `
    <span class="sum-chip">Current total: <span class="sum-val ${cOk ? 'ok' : 'warn'}">${sumCurrent.toFixed(2)}%</span></span>
    <span style="color:var(--color-border-secondary)">|</span>
    <span class="sum-chip">Target total: <span class="sum-val ${tOk ? 'ok' : 'warn'}">${sumTarget.toFixed(2)}%</span></span>
    ${!cOk || !tOk ? '<span style="color:var(--color-text-warning);font-size:14px;">⚠ totals should sum to 100%</span>' : ''}
  `;
}

function renderConfig() {
  document.getElementById('configBody').innerHTML = categories.map((c, i) => `
    <tr data-idx="${i}">
      <td><input type="text" data-field="name" value="${c.name}"></td>
      <td><input type="number" data-field="current" value="${c.current}" step="0.01" min="0" max="100"></td>
      <td><input type="number" data-field="target"  value="${c.target}"  step="0.01" min="0" max="100"></td>
      <td class="gap-cell" style="text-align:right;">${gapPill(c.target - c.current)}</td>
      <td><button class="del-btn" title="Remove">×</button></td>
    </tr>
  `).join('');
  updateSumRow();
}

// --- Allocator ---
function computeAllocations() {
  const gaps      = categories.map(c => Math.max(0, c.target - c.current));
  const totalGap  = gaps.reduce((a, b) => a + b, 0);
  const totalTarget = categories.reduce((a, c) => a + c.target, 0);
  return categories.map((c, i) => {
    const gap = c.target - c.current;
    let alloc = 0;
    if (mode === 'need') {
      alloc = totalGap > 0 ? (Math.max(0, gap) / totalGap) * amount : 0;
    } else {
      alloc = totalTarget > 0 ? (c.target / totalTarget) * amount : 0;
    }
    return { ...c, gap, alloc: Math.round(alloc) };
  });
}

function getBadge(gap) {
  if (gap > 2)   return '<span class="badge badge-green">Underweight</span>';
  if (gap > 0)   return '<span class="badge badge-amber">Slightly under</span>';
  if (gap === 0) return '<span class="badge badge-neutral">On target</span>';
  if (gap > -2)  return '<span class="badge badge-amber">Slightly over</span>';
  return '<span class="badge badge-red">Overweight</span>';
}

function getBarColor(gap) {
  if (gap > 2)  return '#1D9E75';
  if (gap > 0)  return '#EF9F27';
  if (gap < -2) return '#E24B4A';
  return '#888780';
}

function renderAllocator() {
  const allocs = computeAllocations();
  const totalAlloc = allocs.reduce((a, c) => a + c.alloc, 0);
  const under = allocs.filter(c => c.gap > 0).length;
  const over  = allocs.filter(c => c.gap < 0).length;
  const maxGap = allocs.length ? Math.max(...allocs.map(c => Math.abs(c.gap))) : 0;

  document.getElementById('summaryCards').innerHTML = `
    <div class="metric-card"><p class="metric-label">Monthly amount</p><p class="metric-val">₹${amount.toLocaleString('en-IN')}</p></div>
    <div class="metric-card"><p class="metric-label">Underweight</p><p class="metric-val pos">${under}</p></div>
    <div class="metric-card"><p class="metric-label">Overweight</p><p class="metric-val neg">${over}</p></div>
    <div class="metric-card"><p class="metric-label">Biggest gap</p><p class="metric-val">${maxGap.toFixed(2)}%</p></div>
  `;

  document.getElementById('allocBody').innerHTML = allocs.map(c => {
    const gapColor = c.gap > 0 ? 'var(--color-text-success)' : c.gap < 0 ? 'var(--color-text-danger)' : 'var(--color-text-secondary)';
    const barPct = Math.round(Math.min(100, c.target > 0 ? (c.current / Math.max(c.current, c.target)) * 100 : 100));
    const sign = c.gap > 0 ? '+' : '';
    return `<tr>
      <td>${c.name}</td>
      <td class="num">${c.current.toFixed(2)}%</td>
      <td class="num">${c.target.toFixed(2)}%</td>
      <td class="num" style="color:${gapColor};font-weight:500;">${sign}${c.gap.toFixed(2)}%</td>
      <td>
        <div style="display:flex;align-items:center;gap:6px;">
          <div class="bar-wrap" style="flex:1;"><div class="bar-fill" style="width:${barPct}%;background:${getBarColor(c.gap)};"></div></div>
          ${getBadge(c.gap)}
        </div>
      </td>
      <td class="num" style="font-weight:${c.alloc > 0 ? '500' : '400'};color:${c.alloc > 0 ? 'var(--color-text-primary)' : 'var(--color-text-secondary)'};">${c.alloc > 0 ? '₹' + c.alloc.toLocaleString('en-IN') : '—'}</td>
    </tr>`;
  }).join('');

  document.getElementById('allocFoot').innerHTML = `
    <tr style="background:var(--color-background-secondary);">
      <td colspan="5" style="padding:8px;font-weight:500;font-size:14px;">Total allocated</td>
      <td class="num" style="padding:8px;font-weight:500;">₹${totalAlloc.toLocaleString('en-IN')}</td>
    </tr>`;

  const notes = {
    proportional: 'Proportional to target: allocates based on target weights across all categories, including overweight ones.',
    need:         'Buy only underweight: zero allocation to at-target or overweight categories; all money goes where it is needed.'
  };
  document.getElementById('modeNote').textContent = notes[mode];
}

renderAllocator();
</script>
